databases:
  - name: mainzer-binger-db
    databaseName: mainzer_binger
    user: mainzer_binger
    plan: free

services:
  # Web uygulaması — Docker ile
  - type: web
    name: mainzer-binger
    runtime: docker
    plan: free
    dockerfilePath: ./Dockerfile
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "False"
      - key: DATABASE_URL
        fromDatabase:
          name: mainzer-binger-db
          property: connectionString
      - key: ALLOWED_HOSTS
        value: "localhost,127.0.0.1"

  # Periyodik görev: RSS duyurularını çek (UTC 01:00 = Berlin 02:00)
  - type: cron
    name: mainzer-binger-rss
    runtime: docker
    plan: free
    schedule: "0 1 * * *"
    dockerfilePath: ./Dockerfile
    dockerCommand: "python manage.py rss_cek"
    envVars:
      - key: SECRET_KEY
        fromService:
          name: mainzer-binger
          type: web
          envVarKey: SECRET_KEY
      - key: DATABASE_URL
        fromDatabase:
          name: mainzer-binger-db
          property: connectionString
      - key: DEBUG
        value: "False"
      - key: ALLOWED_HOSTS
        value: "localhost"
