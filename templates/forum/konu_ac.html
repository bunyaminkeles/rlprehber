{% extends 'base.html' %}
{% block title %}Konu Aç — {{ kategori.ad }}{% endblock %}
{% block content %}
<div class="container mt-4" style="max-width:640px">
  <h4 class="mb-4"><i class="bi bi-plus-circle me-2 text-primary"></i>Konu Aç — {{ kategori.ad }}</h4>
  <div class="card">
    <div class="card-body p-4">
      <form method="post" enctype="multipart/form-data">
        {% csrf_token %}
        <div class="mb-3">
          <label class="form-label fw-semibold">Başlık</label>
          <input type="text" name="baslik" class="form-control" required maxlength="200">
        </div>
        <div class="mb-3">
          <label class="form-label fw-semibold">İçerik</label>
          <textarea name="icerik" class="form-control" rows="6" required></textarea>
        </div>
        <div class="mb-3">
          <label class="form-label fw-semibold">Resim <span class="text-muted fw-normal">(opsiyonel)</span></label>
          <input type="file" name="resim" class="form-control" accept="image/*">
        </div>
        <button type="submit" class="btn btn-primary w-100">
          <i class="bi bi-send me-2"></i>Konuyu Aç
        </button>
      </form>
    </div>
  </div>
</div>
{% endblock %}
