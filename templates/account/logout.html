<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Çıkış — RLP Rehber</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
  {% load static %}
  <link href="{% static 'css/main.css' %}" rel="stylesheet">
  <style>
    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #1a3d5c 0%, #2C5F8A 50%, #4A9E8F 100%);
    }
    .logout-card {
      background: #fff;
      border-radius: 20px;
      padding: 2.5rem 2.5rem 2rem;
      box-shadow: 0 20px 60px rgba(0,0,0,0.25);
      max-width: 400px;
      width: 90%;
      text-align: center;
    }
    .logout-icon-wrap {
      width: 72px;
      height: 72px;
      background: rgba(44,95,138,0.08);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 1.25rem;
      font-size: 2rem;
      color: #2C5F8A;
    }
    .logout-card h2 {
      font-size: 1.5rem;
      font-weight: 700;
      color: #1a2d3d;
      margin-bottom: 0.4rem;
    }
    .logout-card p {
      color: #718096;
      font-size: 0.95rem;
      margin-bottom: 1.8rem;
    }
    .btn-logout {
      display: block;
      width: 100%;
      padding: 0.75rem;
      background: linear-gradient(135deg, #2C5F8A, #1a3d5c);
      color: #fff;
      border: none;
      border-radius: 10px;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.2s, transform 0.15s;
      margin-bottom: 0.75rem;
    }
    .btn-logout:hover { opacity: 0.9; transform: translateY(-1px); }
    .btn-cancel {
      display: block;
      width: 100%;
      padding: 0.65rem;
      background: transparent;
      color: #718096;
      border: 1.5px solid #e2e8f0;
      border-radius: 10px;
      font-size: 0.95rem;
      font-weight: 500;
      text-decoration: none;
      transition: all 0.2s;
    }
    .btn-cancel:hover { border-color: #2C5F8A; color: #2C5F8A; }
    .site-logo {
      font-size: 0.9rem;
      font-weight: 700;
      color: #a0aec0;
      letter-spacing: 1px;
      text-transform: uppercase;
      margin-bottom: 2rem;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.4rem;
    }
    .site-logo i { color: #4A9E8F; }
  </style>
</head>
<body>
  <div class="logout-card">
    <div class="site-logo">
      <i class="bi bi-geo-alt-fill"></i> RLP Rehber
    </div>

    <div class="logout-icon-wrap">
      <i class="bi bi-box-arrow-right"></i>
    </div>

    <h2>Çıkış Yapmak İstediğinize Emin Misiniz?</h2>
    <p>Oturumunuzu sonlandırmak üzeresiniz. Dilediğiniz zaman tekrar giriş yapabilirsiniz.</p>

    <form method="post" action="{% url 'account_logout' %}">
      {% csrf_token %}
      {{ redirect_field }}
      <button type="submit" class="btn-logout">
        <i class="bi bi-box-arrow-right me-2"></i>Evet, Çıkış Yap
      </button>
    </form>
    <a href="{% url 'core:anasayfa' %}" class="btn-cancel">
      <i class="bi bi-arrow-left me-1"></i>Vazgeç, Ana Sayfaya Dön
    </a>
  </div>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
