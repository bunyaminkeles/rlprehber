<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Doğrulama E-postası Gönderildi — Almanyalı Rehber</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
  {% load static %}<link href="{% static 'css/main.css' %}" rel="stylesheet">
  <style>
    body { margin:0; padding:0; min-height:100vh; background:#0f2240; display:flex; align-items:center; justify-content:center; }
    .card { background:#fff; border-radius:16px; padding:2.5rem; max-width:440px; width:100%; margin:2rem; box-shadow:0 20px 60px rgba(0,0,0,0.35); text-align:center; }
    .icon-box { width:72px; height:72px; border-radius:50%; background:#f0f5fb; color:#2C5F8A; display:flex; align-items:center; justify-content:center; margin:0 auto 1.2rem; font-size:2rem; }
    .logo-link { display:flex; align-items:center; justify-content:center; gap:.5rem; font-weight:700; font-size:1.1rem; color:#2C5F8A; text-decoration:none; margin-bottom:1.5rem; }
  </style>
</head>
<body>
<div class="card">
  <a href="{% url 'core:anasayfa' %}" class="logo-link"><i class="bi bi-geo-alt-fill text-primary"></i> Almanyalı Rehber</a>
  <div class="icon-box"><i class="bi bi-envelope-paper"></i></div>
  <h4 style="font-weight:700;color:#1a2d3d;margin-bottom:.5rem;">E-posta Gönderildi</h4>
  <p style="color:#718096;font-size:0.92rem;line-height:1.6;">
    Doğrulama bağlantısı e-posta adresinize gönderildi. Gelen kutunuzu kontrol edin.
    Birkaç dakika içinde gelmezse spam klasörüne bakın.
  </p>
  <a href="{% url 'core:anasayfa' %}" class="btn btn-primary mt-2 px-4">Ana Sayfaya Dön</a>
</div>
</body>
</html>
