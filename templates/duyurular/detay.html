{% extends 'base.html' %}
{% block title %}{{ duyuru.baslik }}{% endblock %}
{% block content %}
<div class="container mt-4" style="max-width:720px">
  <a href="/{{ stadt.slug }}/duyurular/" class="btn btn-sm btn-outline-secondary mb-3">
    <i class="bi bi-arrow-left me-1"></i>Geri
  </a>
  <div class="card">
    <div class="card-body p-4">
      <span class="badge-duyuru mb-2 d-inline-block">{{ duyuru.get_kategori_display }}</span>
      <h4 class="mb-1">{{ duyuru.baslik }}</h4>
      <small class="text-muted">{{ duyuru.olusturulma|date:"d.m.Y H:i" }}</small>
      <hr>
      <div>{{ duyuru.icerik|linebreaks }}</div>
      {% if duyuru.kaynak_url %}
      <a href="{{ duyuru.kaynak_url }}" target="_blank" class="btn btn-sm btn-outline-primary mt-2">
        <i class="bi bi-box-arrow-up-right me-1"></i>Kaynak
      </a>
      {% endif %}
    </div>
  </div>
</div>
{% endblock %}
