{% extends 'base.html' %}
{% block title %}Profilim{% endblock %}
{% block content %}
<div class="container mt-4" style="max-width:560px">
  <h4 class="mb-4"><i class="bi bi-person-gear me-2 text-primary"></i>Profilim</h4>
  <div class="card">
    <div class="card-body p-4">
      <form method="post">
        {% csrf_token %}
        <div class="mb-2">
          <label class="form-label fw-semibold">Şehir</label>
          <select name="sehir" id="sehir-select" class="form-select">
            <option value="">— Seçiniz —</option>
            {% for s in sehirler %}
              <option value="{{ s.name }}" {% if profil.sehir == s.name %}selected{% endif %}>{{ s.name }}</option>
            {% endfor %}
            <option value="__diger__" {% if profil.sehir and profil.sehir not in sehir_adlari %}selected{% endif %}>Diğer</option>
          </select>
          <input type="text" id="sehir-diger" name="sehir_diger" class="form-control mt-2"
                 placeholder="Şehrinizi yazın..."
                 value="{% if profil.sehir and profil.sehir not in sehir_adlari %}{{ profil.sehir }}{% endif %}"
                 style="display:none;">
        </div>
        <div class="mb-3">
          <div class="form-check">
            <input class="form-check-input" type="checkbox" name="sehir_gizli" id="sehir_gizli" {% if profil.sehir_gizli %}checked{% endif %}>
            <label class="form-check-label text-muted small" for="sehir_gizli">Şehrimi gizle</label>
          </div>
        </div>
        <div class="mb-2">
          <label class="form-label fw-semibold">Biyografi <span class="text-muted fw-normal">— opsiyonel</span></label>
          <textarea name="biyografi" class="form-control" rows="4">{{ profil.biyografi }}</textarea>
        </div>
        <div class="mb-3">
          <div class="form-check">
            <input class="form-check-input" type="checkbox" name="biyografi_gizli" id="biyografi_gizli" {% if profil.biyografi_gizli %}checked{% endif %}>
            <label class="form-check-label text-muted small" for="biyografi_gizli">Biyografimi gizle</label>
          </div>
        </div>
        <button type="submit" class="btn btn-primary w-100">
          <i class="bi bi-check2 me-2"></i>Kaydet
        </button>
      </form>
    </div>
  </div>
</div>
<script>
  const sel = document.getElementById('sehir-select');
  const diger = document.getElementById('sehir-diger');
  function toggle() {
    diger.style.display = sel.value === '__diger__' ? '' : 'none';
  }
  sel.addEventListener('change', toggle);
  toggle();

  sel.closest('form').addEventListener('submit', function() {
    if (sel.value === '__diger__') {
      sel.name = '';
      diger.name = 'sehir';
    }
  });
</script>
{% endblock %}
