{% extends 'base.html' %}
{% block title %}{{ sayfa.baslik }} — Kaynaklar{% endblock %}
{% block content %}
<div class="container mt-4" style="max-width:760px">
  <a href="/{{ stadt.slug }}/rehber/" class="btn btn-sm btn-outline-secondary mb-3">
    <i class="bi bi-arrow-left me-1"></i>Kaynaklara Dön
  </a>
  <div class="card">
    <div class="card-body p-4">
      <h4 class="mb-1"><i class="bi {{ sayfa.icon }} me-2 text-primary"></i>{{ sayfa.baslik }}</h4>
      <small class="text-muted">Son güncelleme: {{ sayfa.guncelleme|date:"d.m.Y" }}</small>
      <hr>
      <div>{{ sayfa.icerik|linebreaks }}</div>
    </div>
  </div>
</div>
{% endblock %}
